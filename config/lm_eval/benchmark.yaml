# https://github.com/EleutherAI/lm-evaluation-harness/blob/main/docs/config_files.md

model: hf
model_args:
  # pretrained: google/gemma-3-270m-it #
  # pretrained: weights/NanoAgent-135M-grpo-hilr
  # pretrained: HuggingFaceTB/SmolLM2-135M-Instruct
  # pretrained: weights/NanoAgent-135M-test-v2
  pretrained: weights/SmolLM2-135M-Instruct-nemotron-instruct-fc-instruct-sft/final_checkpoint
  dtype: bfloat16
  tie_word_embeddings: true
  low_cpu_mem_usage: true


gen_kwargs:
  # stop: <|im_end|>
  do_sample: false
#   temperature: 0.3
#   top_k: 0.95


tasks:
  - ifeval
  - commonsense_qa
  - tinyBenchmarks

# num_fewshot: 5
batch_size: 1
device: mps
apply_chat_template: true

output_path: ./benchmarks/
log_samples: true

# Command: lm-eval run --config config/lm_eval/benchmark.yaml